<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Food Seva Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <img id="appLogo" src="logo.png" alt="Food Seva Tracker logo" class="logo" />
        <div id="logoFallback" class="logo-fallback hidden">Food Seva Tracker</div>
      </div>
      <nav id="tabs" class="tabs hidden">
        <button class="tab" data-page="home">Home</button>
        <button class="tab" data-page="log">Log Time</button>
        <button class="tab" data-page="schedule">Schedule</button>
        <button class="tab" data-page="redeem">Redeem</button>
        <button class="tab" data-page="voucher">Voucher</button>
        <button class="tab" data-page="members admin-only">Members</button>
        <button class="tab" data-page="account">Account</button>
      </nav>
    </header>

    <main id="app" class="app-content"></main>
  </div>

  <script src="script.js"></script>
</body>
</html>
